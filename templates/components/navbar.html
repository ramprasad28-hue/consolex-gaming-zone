<nav class="navbar" id="navbar">
    <div class="nav-inner">

        <!-- Logo -->
        <a href="/" class="nav-logo">
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
                <rect x="3" y="10" width="28" height="16" rx="4" stroke="url(#ng)" stroke-width="1.5" fill="none"/>
                <circle cx="11" cy="18" r="2.8" stroke="#00D9FF" stroke-width="1.2" fill="none"/>
                <rect x="14.5" y="15" width="1.6" height="6" rx="0.8" fill="#8A2BE2"/>
                <rect x="12" y="17.2" width="6" height="1.6" rx="0.8" fill="#8A2BE2"/>
                <rect x="20" y="15.5" width="5" height="1.5" rx="0.75" fill="#FF6A00"/>
                <rect x="20" y="18.5" width="5" height="1.5" rx="0.75" fill="#FF6A00"/>
                <defs>
                    <linearGradient id="ng" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#00D9FF"/>
                        <stop offset="100%" stop-color="#8A2BE2"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="nav-logo-text">
                <span class="nav-logo-name">CONSOLEX</span>
                <span class="nav-logo-tag">PLAY BEYOND</span>
            </div>
        </a>

        <!-- Desktop Links — simplified to match reference -->
        <ul class="nav-links" id="navLinks">
            <li><a href="/" class="nl {% if request.path == '/' %}active{% endif %}">Home</a></li>
            <li><a href="{% url 'bookings:booking_form' %}" class="nl {% if request.path == '/book/' %}active{% endif %}">Booking</a></li>
            <li><a href="{% url 'memberships:plan_list' %}" class="nl {% if request.path == '/memberships/' %}active{% endif %}">Membership</a></li>
        </ul>

        <!-- Right actions -->
        <div class="nav-actions">
            {% if user.is_authenticated %}
                <a href="{% url 'users:dashboard' %}" class="nav-user-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    {{ user.username }}
                </a>
                <form method="POST" action="{% url 'users:logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-logout" style="background:none;border:none;cursor:pointer;font:inherit;color:inherit;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'bookings:booking_form' %}" class="nav-book-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8"  y1="2" x2="8"  y2="6"/>
                        <line x1="3"  y1="10" x2="21" y2="10"/>
                    </svg>
                    Book Now
                </a>
            {% endif %}
        </div>

        <!-- Hamburger -->
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span class="hb-line"></span>
            <span class="hb-line"></span>
            <span class="hb-line"></span>
        </button>

    </div>

    <!-- Mobile Drawer -->
    <div class="mob-drawer" id="mobDrawer">
        <ul class="mob-links">
            <li><a href="/" class="mob-link">Home</a></li>
            <li><a href="{% url 'bookings:booking_form' %}" class="mob-link">Booking</a></li>
            <li><a href="{% url 'memberships:plan_list' %}" class="mob-link">Membership</a></li>
        </ul>
        <div class="mob-auth">
            {% if user.is_authenticated %}
                <a href="{% url 'users:dashboard' %}" class="mob-dash-link">My Bookings</a>
                <form method="POST" action="{% url 'users:logout' %}" style="margin:0;">
                    {% csrf_token %}
                    <button type="submit" class="mob-logout-link" style="background:none;border:none;cursor:pointer;font:inherit;color:inherit;width:100%;text-align:left;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'bookings:booking_form' %}" class="mob-book-link">🎮 Book a Slot</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
(function () {
    var btn     = document.getElementById('hamburger');
    var drawer  = document.getElementById('mobDrawer');
    var navbar  = document.getElementById('navbar');
    var isOpen  = false;

    window.addEventListener('scroll', function () {
        navbar.classList.toggle('nav-scrolled', window.scrollY > 50);
    }, { passive: true });

    btn.addEventListener('click', function () {
        isOpen = !isOpen;
        btn.classList.toggle('hb-open', isOpen);
        drawer.classList.toggle('drawer-open', isOpen);
        document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    drawer.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
            isOpen = false;
            btn.classList.remove('hb-open');
            drawer.classList.remove('drawer-open');
            document.body.style.overflow = '';
        });
    });

    document.querySelectorAll('a[href^="#"]').forEach(function (a) {
        a.addEventListener('click', function (e) {
            var id = a.getAttribute('href').slice(1);
            var el = document.getElementById(id);
            if (el) {
                e.preventDefault();
                window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 76, behavior: 'smooth' });
            }
        });
    });
}());
</script>
