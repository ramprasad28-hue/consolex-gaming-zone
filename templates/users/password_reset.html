{% extends "base.html" %}
{% block title %}Reset Password — CONSOLEX{% endblock %}
{% block content %}
<section class="auth-section container">
  <div class="auth-card">
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-sub">Enter your email and we'll send you a link to reset your password.</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-primary btn-full">Send Reset Link</button>
    </form>
    <a href="{% url 'users:login' %}" class="auth-back">Back to login</a>
  </div>
</section>
{% endblock %}
