name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  django:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_ENV: development
      SECRET_KEY: ci-insecure-test-key-not-used-in-prod
      DEBUG: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/requirements/base.txt
          pip install -r apps/requirements/production.txt
          pip install razorpay twilio

      - name: Django system check
        run: python manage.py check

      - name: Migration drift guard
        # Fails the build if any model changes are missing a migration.
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test
